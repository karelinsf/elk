filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /var/log/nginx/access.log
    processors:
      - drop_fields:
          fields: ["beat", "input_type","prospector", "input", "host", "agent", "ecs"]
    
    fields:
      service: log_gen
    
output.logstash:
  enabled: true
  hosts: ["logstash:5044"]